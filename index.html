<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammed Almomani</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #0f0f0f);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* خلفية متحركة */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #00c6ff, #0072ff, #00c6ff);
    animation: moveBg 10s linear infinite;
    opacity: 0.08;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    100% { transform: translate(-50%, -50%); }
}

.container {
    margin-top: 60px;
    position: relative;
    z-index: 1;
}

/* صورة البروفايل */
.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #00c6ff;
    box-shadow: 0 0 25px #00c6ff;
    animation: float 3s ease-in-out infinite;
}

/* حركة خفيفة للصورة */
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

h1 {
    margin-top: 15px;
}

p {
    color: #aaa;
    margin-bottom: 30px;
}

/* الأزرار */
.link {
    display: block;
    width: 270px;
    margin: 15px auto;
    padding: 15px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

/* تأثير نيون عند المرور */
.link:hover {
    transform: scale(1.07);
    background: #00c6ff;
    box-shadow: 0 0 20px #00c6ff, 0 0 40px #0072ff;
}

/* تأثير لمعان */
.link::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    top: -100%;
    left: 0;
    background: linear-gradient(transparent, rgba(255,255,255,0.2), transparent);
    transition: 0.5s;
}

.link:hover::before {
    top: 100%;
}
</style>

</head>
<body>

<div class="container">
