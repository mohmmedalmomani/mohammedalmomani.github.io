<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    overflow-x: hidden;
    background: #050811;
    color: #fff;
}

/* 3D Canvas Background */
#canvas-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: block;
}

/* Main Container */
.container {
    position: relative;
    z-index: 10;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 24px 60px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Premium Glassmorphic Card */
.premium-card {
    background: rgba(8, 16, 28, 0.55);
    backdrop-filter: blur(18px);
    border-radius: 72px;
    border: 1px solid rgba(0, 255, 255, 0.2);
    box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 255, 255, 0.1) inset, 0 0 40px rgba(0, 200, 255, 0.1);
    padding: 42px 32px;
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.premium-card:hover {
    transform: translateY(-5px);
    border-color: rgba(0, 255, 255, 0.4);
    box-shadow: 0 35px 60px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(0, 255, 255, 0.2) inset;
}

/* Profile Section with 3D Holographic Ring */
.profile-orb {
    position: relative;
    width: 150px;
    height: 150px;
    margin: 0 auto 24px;
    cursor: pointer;
}

.profile-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #00f2ff;
    box-shadow: 0 0 35px rgba(0, 242, 255, 0.5);
    transition: all 0.4s ease;
    position: relative;
    z-index: 2;
}

.holo-ring {
    position: absolute;
    top: -10px;
    left: -10px;
    right: -10px;
    bottom: -10px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #00f2ff, #ff00d4, #7000ff, #00f2ff);
    opacity: 0.6;
    filter: blur(10px);
    animation: spinHolo 5s linear infinite;
    z-index: 1;
}

@keyframes spinHolo {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.profile-img:hover {
    transform: scale(1.06);
    box-shadow: 0 0 55px rgba(0, 242, 255, 0.8);
}

/* Typography */
h1 {
    font-size: 2.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, #ffffff, #7efff5, #00c3ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
}

.glow-bio {
    font-size: 1rem;
    color: #b0e0ff;
    font-weight: 400;
    letter-spacing: 0.3px;
    background: rgba(0, 150, 255, 0.1);
    display: inline-block;
    padding: 6px 18px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
    margin: 10px 0 5px;
}

/* Premium Stats */
.stats-container {
    display: flex;
    justify-content: center;
    gap: 35px;
    margin: 35px 0 30px;
    flex-wrap: wrap;
}

.stat-block {
    background: rgba(0, 30, 50, 0.6);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    border-radius: 60px;
    border: 1px solid rgba(0, 255, 255, 0.3);
    transition: all 0.3s ease;
    text-align: center;
    min-width: 110px;
}

.stat-block:hover {
    transform: translateY(-6px) scale(1.03);
    background: rgba(0, 200, 255, 0.2);
    border-color: #0ff;
    box-shadow: 0 10px 25px rgba(0, 200, 255, 0.3);
}

.stat-num {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff, #5ce0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
}

.stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #9cf;
    margin-top: 5px;
}

/* Professional Social Links */
.social-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    width: 100%;
    max-width: 420px;
    margin: 14px auto;
    padding: 14px 28px;
    border-radius: 100px;
    text-decoration: none;
    color: white;
    background: rgba(12, 22, 40, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 200, 255, 0.25);
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    position: relative;
    overflow: hidden;
}

.link-content {
    display: flex;
    align-items: center;
    gap: 18px;
}

.social-link i {
    font-size: 1.6rem;
    width: 34px;
    text-align: center;
    transition: all 0.2s;
}

.social-link .link-text {
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 0.3px;
}

.social-link .arrow-icon {
    opacity: 0;
    transform: translateX(-12px);
    transition: all 0.3s;
    font-size: 1.2rem;
}

.social-link:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: #0ff;
    box-shadow: 0 12px 30px -8px rgba(0, 200, 255, 0.4);
    background: linear-gradient(95deg, rgba(0, 150, 255, 0.2), rgba(0, 220, 255, 0.1));
}

.social-link:hover .arrow-icon {
    opacity: 1;
    transform: translateX(0);
}

.social-link:hover i {
    transform: scale(1.12);
    filter: drop-shadow(0 0 5px cyan);
}

/* Platform specific neon glows */
.link-linkedin:hover { border-color: #0a66c2; box-shadow: 0 0 20px #0a66c280; }
.link-instagram:hover { border-color: #e4405f; box-shadow: 0 0 20px #e4405f80; }
.link-youtube:hover { border-color: #ff0000; box-shadow: 0 0 20px #ff000080; }
.link-twitter:hover { border-color: #1da1f2; box-shadow: 0 0 20px #1da1f280; }
.link-discord:hover { border-color: #5865f2; box-shadow: 0 0 20px #5865f280; }

/* Music / Experience Toggle */
.experience-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 100;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(14px);
    border-radius: 60px;
    padding: 12px 22px;
    border: 1px solid rgba(0, 255, 255, 0.5);
    color: #0ff;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
    font-family: monospace;
}

.experience-btn:hover {
    background: #0ff22a20;
    transform: scale(1.05);
    box-shadow: 0 0 18px cyan;
    border-color: cyan;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 48px;
    font-size: 0.7rem;
    color: #8a9cbb;
    opacity: 0.7;
    letter-spacing: 1px;
}

/* Responsive */
@media (max-width: 550px) {
    .premium-card {
        padding: 30px 20px;
    }
    .profile-orb {
        width: 120px;
        height: 120px;
    }
    h1 {
        font-size: 1.8rem;
    }
    .stat-block {
        padding: 8px 16px;
        min-width: 85px;
    }
    .stat-num {
        font-size: 1.5rem;
    }
    .social-link {
        max-width: 300px;
        padding: 11px 20px;
    }
    .social-link i {
        font-size: 1.3rem;
        width: 28px;
    }
    .experience-btn {
        padding: 8px 16px;
        font-size: 0.75rem;
        bottom: 18px;
        right: 18px;
    }
}

/* Custom scrollbar */
::-webkit-scrollbar {
    width: 5px;
}
::-webkit-scrollbar-track {
    background: #0a0f1a;
}
::-webkit-scrollbar-thumb {
    background: linear-gradient(#00c6ff, #0072ff);
    border-radius: 10px;
}
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="container">
    <div class="premium-card">
        <div class="profile-orb">
            <div class="holo-ring"></div>
            <img class="profile-img" src="https://i.imgur.com/TCCJDie.jpeg" alt="Mohammed Almomani">
        </div>
        
        <h1>Mohammed Almomani</h1>
        <div class="glow-bio" id="dynamicBio">⚡ Software Engineer | 3D Architect ⚡</div>
        
        <div class="stats-container">
            <div class="stat-block">
                <div class="stat-num" data-target="732">732+</div>
                <div class="stat-label">Connections</div>
            </div>
            <div class="stat-block">
                <div class="stat-num" data-target="1850">1.8K+</div>

            </div>
            <div class="stat-block">
                <div class="stat-num" data-target="94">94+</div>
                <div class="stat-label">Projects</div>
            </div>
        </div>
        
        <!-- Enhanced Social Links -->
        <a class="social-link link-linkedin" href="https://www.linkedin.com/in/mohmmed-almomani-819b70400" target="_blank">
            <div class="link-content">
                <i class="fab fa-linkedin-in"></i>
                <span class="link-text">LinkedIn</span>
            </div>
            <span class="arrow-icon"><i class="fas fa-arrow-right"></i></span>
        </a>
        
        <a class="social-link link-instagram" href="https://www.instagram.com/7amodah_momani/" target="_blank">
            <div class="link-content">
                <i class="fab fa-instagram"></i>

            </div>
            <span class="arrow-icon"><i class="fas fa-arrow-right"></i></span>
        </a>
        
        <a class="social-link link-youtube" href="https://www.youtube.com/@IEEEANUStudentBranch" target="_blank">
            <div class="link-content">
                <i class="fab fa-youtube"></i>
                <span class="link-text">YouTube</span>
            </div>
            <span class="arrow-icon"><i class="fas fa-arrow-right"></i></span>
        </a>
        
        <a class="social-link link-twitter" href="https://x.com/MohmmedAlm69518" target="_blank">
            <div class="link-content">
                <i class="fab fa-twitter"></i>
                <span class="link-text">X (Twitter)</span>

        <a class="social-link link-discord" href="https://discord.gg/respectdev" target="_blank">
            <div class="link-content">

    <i class="fas fa-cube"></i> <span id="fxStatus">🌊 Cyber Pulse</span>

<script type="module">
    import * as THREE from 'three';

    // ---------- 3D SCENE: Advanced Particle Galaxy + Rotating Core ----------
    const canvas = document.getElementById('canvas-bg');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050811);
    scene.fog = new THREE.FogExp2(0x050811, 0.004);
    
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.2, 12);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    
    // Lighting System: Dynamic + Colorful
    const ambient = new THREE.AmbientLight(0x111a2a);
    scene.add(ambient);
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(2, 3, 4);
    scene.add(keyLight);
    const fillLight = new THREE.PointLight(0x2266cc, 0.6);
    fillLight.position.set(1, 1, 2);
    scene.add(fillLight);
    const backLight = new THREE.PointLight(0xff44aa, 0.5);
    backLight.position.set(-1.5, 1.5, -3);
    scene.add(backLight);
    const movingLight = new THREE.PointLight(0x00ccff, 0.7);
    movingLight.position.set(0, 1, 2);
    scene.add(movingLight);
    
    // Central Artistic Element: Icosahedron with wireframe & glow
    const coreGeo = new THREE.IcosahedronGeometry(1.1, 0);
    const coreMat = new THREE.MeshStandardMaterial({
        color: 0x2a6eff,
        emissive: 0x0044aa,
        emissiveIntensity: 0.5,
        metalness: 0.85,
        roughness: 0.25,
        flatShading: false
    });
    const coreMesh = new THREE.Mesh(coreGeo, coreMat);
    scene.add(coreMesh);
    
    // Wireframe outer shell
    const wireframeGeo = new THREE.IcosahedronGeometry(1.25, 0);
    const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x00ddff, wireframe: true, transparent: true, opacity: 0.25 });
    const wireframeObj = new THREE.Mesh(wireframeGeo, wireframeMat);
    scene.add(wireframeObj);
    
    // Floating particles ring (Toroidal field)
    const particleCount = 2800;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        // Spherical distribution with some torus influence
        const radius = 2.2 + Math.random() * 1.2;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.sin(phi) * Math.sin(theta) * 0.6;
        const z = radius * Math.cos(phi);
        positions[i*3] = x;
        positions[i*3+1] = y * 0.8;
        positions[i*3+2] = z;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({
        color: 0x88aaff,
        size: 0.045,
        transparent: true,
        blending: THREE.AdditiveBlending,
        opacity: 0.6
    });
    const particleField = new THREE.Points(particleGeo, particleMat);
    scene.add(particleField);
    
    // Starfield background (distant stars)
    const starCount = 1800;
    const starGeoBg = new THREE.BufferGeometry();
    const starPos = [];
    for (let i = 0; i < starCount; i++) {
        starPos.push((Math.random() - 0.5) * 200);
        starPos.push((Math.random() - 0.5) * 120);
        starPos.push((Math.random() - 0.5) * 90 - 40);
    }
    starGeoBg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
    const starMatBg = new THREE.PointsMaterial({ color: 0xaaddff, size: 0.08, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
    const starsField = new THREE.Points(starGeoBg, starMatBg);
    scene.add(starsField);
    
    // Extra Floating Orbs (energy)
    const orbGroup = new THREE.Group();
    const orbMat = new THREE.MeshStandardMaterial({ color: 0xff66cc, emissive: 0x441155, emissiveIntensity: 0.4 });
    for (let i = 0; i < 32; i++) {
        const orb = new THREE.Mesh(new THREE.SphereGeometry(0.055, 6, 6), orbMat);
        const rad = 1.9;
        const angle = (i / 32) * Math.PI * 2;
        orb.position.set(Math.cos(angle) * rad, Math.sin(angle * 2) * 0.8, Math.sin(angle) * rad);
        orbGroup.add(orb);
    }
    scene.add(orbGroup);
    
    // Animation Loop Variables
    let time = 0;
    let intensityPulse = 0;
    let pulseDir = 1;
    
    function animate3D() {
        requestAnimationFrame(animate3D);
        time += 0.009;
        
        // Rotations
        coreMesh.rotation.y += 0.003;
        coreMesh.rotation.x = Math.sin(time * 0.2) * 0.1;
        wireframeObj.rotation.y = coreMesh.rotation.y;
        wireframeObj.rotation.x = coreMesh.rotation.x;
        particleField.rotation.y += 0.0008;
        particleField.rotation.x = Math.sin(time * 0.15) * 0.05;
        starsField.rotation.y -= 0.0003;
        orbGroup.rotation.z += 0.005;
        orbGroup.rotation.y += 0.002;
        
        // Pulsing effect on core emissive
        intensityPulse += 0.02 * pulseDir;
        if (intensityPulse > 0.9) { intensityPulse = 0.9; pulseDir = -1; }
        if (intensityPulse < 0.3) { intensityPulse = 0.3; pulseDir = 1; }
        coreMat.emissiveIntensity = 0.45 + intensityPulse * 0.25;
        
        // Moving light
        movingLight.position.x = Math.sin(time) * 1.8;
        movingLight.position.z = Math.cos(time * 0.7) * 2;
        movingLight.intensity = 0.6 + Math.sin(time * 2) * 0.2;
        
        // Camera subtle motion
        camera.position.x += (0 - camera.position.x) * 0.02;
        camera.position.y = 1.2 + Math.sin(time * 0.3) * 0.05;
        camera.lookAt(0, 0.2, 0);
        
        renderer.render(scene, camera);
    }
    
    animate3D();
    
    // Resize handler
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // ---------- INTERACTIVE UI ENHANCEMENTS ----------
    
    // Animated Stats Counter
    function animateStats() {
        const statNumbers = document.querySelectorAll('.stat-num');
        statNumbers.forEach(el => {
            const raw = el.getAttribute('data-target') || el.innerText;
            let target = 0;
            if (raw.includes('K')) {
                target = parseFloat(raw) * 1000;
            } else if (raw.includes('+')) {
                target = parseInt(raw);
            } else {
                target = parseInt(raw);
            }
            if (isNaN(target)) target = 500;
            let current = 0;
            const step = Math.max(1, Math.ceil(target / 65));
            const interval = setInterval(() => {
                current += step;
                if (current >= target) {
                    current = target;
                    clearInterval(interval);
                    if (target >= 1000) {
                        el.innerText = (target / 1000).toFixed(1) + 'K+';
                    } else {
                        el.innerText = Math.floor(current) + '+';
                    }
                } else {
                    if (target >= 1000) {
                        el.innerText = (current / 1000).toFixed(1) + 'K';
                    } else {
                        el.innerText = Math.floor(current) + '+';
                    }
                }
            }, 18);
        });
    }
    
    // Dynamic Bio Rotator
    const bioEl = document.getElementById('dynamicBio');
    const bioMessages = [
        "⚡ Software Engineer | 3D Architect ⚡",
        "💻 Programmer & Developer at Respect Server",
        "🚀 Building Digital Realities & Scalable Systems",
        "🎨 Creative Coder | Full-Stack Visionary",
        "🔮 Cyber Architect | Next-Gen Solutions"
    ];
    let bioIdx = 0;
    setInterval(() => {
        bioIdx = (bioIdx + 1) % bioMessages.length;
        bioEl.style.opacity = '0';
        setTimeout(() => {
            bioEl.textContent = bioMessages[bioIdx];
            bioEl.style.opacity = '1';
        }, 280);
    }, 4700);
    
    // FX Button: toggle dynamic 3D effect (increase glow)
    const fxBtn = document.getElementById('fxBtn');
    const fxStatusSpan = document.getElementById('fxStatus');
    let fxActive = false;
    fxBtn.addEventListener('click', () => {
        fxActive = !fxActive;
        if (fxActive) {
            coreMat.emissiveIntensity = 1.1;
            particleMat.color.setHex(0xff88ff);
            starMatBg.color.setHex(0xffaa88);
            fxStatusSpan.innerHTML = '✨ Hyper Mode ✨';
            fxBtn.style.borderColor = '#ff44ff';
            fxBtn.style.boxShadow = '0 0 20px #ff44ff';
            setTimeout(() => {
                if (fxActive) {
                    coreMat.emissiveIntensity = 0.7;
                }
            }, 800);
        } else {
            coreMat.emissiveIntensity = 0.55;
            particleMat.color.setHex(0x88aaff);
            starMatBg.color.setHex(0xaaddff);
            fxStatusSpan.innerHTML = '🌊 Cyber Pulse';
            fxBtn.style.borderColor = '#0ff';
            fxBtn.style.boxShadow = 'none';
        }
    });
    
    // Profile click animation + 3D flash
    const profileImg = document.querySelector('.profile-img');
    profileImg.addEventListener('click', () => {
        profileImg.style.transform = 'scale(1.08) rotate(360deg)';
        setTimeout(() => { profileImg.style.transform = ''; }, 500);
        coreMat.emissiveIntensity = 1.3;
        setTimeout(() => { coreMat.emissiveIntensity = 0.6; }, 400);
        // Flash effect on canvas
        const flashOverlay = document.createElement('div');
        flashOverlay.style.position = 'fixed';
        flashOverlay.style.top = 0;
        flashOverlay.style.left = 0;
        flashOverlay.style.width = '100%';
        flashOverlay.style.height = '100%';
        flashOverlay.style.backgroundColor = 'rgba(0,200,255,0.15)';
        flashOverlay.style.pointerEvents = 'none';
        flashOverlay.style.zIndex = '999';
        document.body.appendChild(flashOverlay);
        setTimeout(() => flashOverlay.remove(), 200);
    });
    
    // Mouse Parallax Effect on 3D objects
    document.addEventListener('mousemove', (e) => {
        const mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        const mouseY = (e.clientY / window.innerHeight) * 2 - 1;
        coreMesh.rotation.y += mouseX * 0.008;
        wireframeObj.rotation.y = coreMesh.rotation.y;
        orbGroup.rotation.x = mouseY * 0.2;
        particleField.rotation.x = mouseY * 0.1;
    });
    
    // Initialize counters
    window.addEventListener('load', () => {
        animateStats();
        bioEl.style.transition = 'opacity 0.3s';
        bioEl.style.opacity = '1';
        // small intro effect
        console.log('%c🚀 Mohammed Almomani | 3D Professional Hub Activated', 'color: #0ff; font-size: 16px; font-weight: bold;');
    });
</script>
</body>
</html>
